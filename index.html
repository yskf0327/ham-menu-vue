<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dialog要素を用いたハンバーガーメニュー</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/destyle.css@4.0.1/destyle.min.css">
  <link rel="stylesheet" href="./css/style.css">
  <!-- Vue3 Global Build -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>
  <div id="app">
    <site-header :pages="pages" v-model:is-nav-open="isNavOpen"></site-header>
    <main>
      <section>
        <div class="container">
          <hgroup>
            <h2 class="section-heading">{{site.title}}</h2>
            <p class="section-heading--sub">{{site.subtitle}}</p>
          </hgroup>
          <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Nemo adipisci maiores accusamus culpa, similique
            veritatis accusantium. Odio rerum, eligendi quas nam, laboriosam voluptatem corporis corrupti ad
            necessitatibus
            animi quo odit.</p>
        </div>
      </section>

    </main>
    <footer>
      <div class="footer-inner container">
        <small>&copy; 2026 Drawer Menu</small>
      </div>
    </footer>
  </div>
  <!-- コンポーネントのファイルを読み込み -->
  <script src="./js/components/SiteHeader.js"></script>
  <!-- Vueのアプリを読み込み -->
  <script src="./js/app.js"></script>
</body>

</html>
